[build]
  base      = "."
  command   = "pnpm install && pnpm --filter @workspace/bawse-dawgs run build"
  publish   = "artifacts/bawse-dawgs/dist/public"

[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "9"
  BASE_PATH    = "/"
  NODE_ENV     = "production"

# SPA fallback — all routes serve index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
