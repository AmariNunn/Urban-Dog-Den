[build]
  base    = "."
  command = "pnpm install --no-frozen-lockfile && BASE_PATH=/ pnpm --filter @workspace/bawse-dawgs run build"
  publish = "artifacts/bawse-dawgs/dist/public"

[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "10"
  BASE_PATH    = "/"

# SPA fallback — all routes serve index.html so direct URLs and refreshes work
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
